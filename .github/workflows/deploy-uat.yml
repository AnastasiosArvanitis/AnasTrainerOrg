name: Deploy to UAT

on:
  workflow_dispatch:

jobs:
  deploy-uat:
    runs-on: ubuntu-latest
    environment: uat
    
    steps:
      # Step 1: Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      # Step 2: Install Salesforce CLI
      - name: Install Salesforce CLI
        run: |
          npm install -g @salesforce/cli
          sf --version
      
      # Step 3: Install sfdx-git-delta plugin
      - name: Install sfdx-git-delta
        run: |
          echo y | sf plugins install sfdx-git-delta
          sf plugins | grep sfdx-git-delta
      
      # Step 4: Generate delta package (only files changed in uat vs main)
      - name: Generate delta package
        id: delta
        run: |
          mkdir -p delta
          sf sgd source delta --to HEAD --from origin/main --output delta --generate-delta --source force-app
          
          echo "=== Delta package.xml ==="
          cat delta/package/package.xml || echo "No package.xml generated"
          echo "========================="
          
          if grep -q "<members>" delta/package/package.xml 2>/dev/null || grep -q "<members>" delta/destructiveChanges/destructiveChanges.xml 2>/dev/null; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "✅ Changes detected, proceeding with deployment"
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "⚠️ No changes detected in force-app compared to main — skipping deployment"
          fi
      
      # Step 5: Authenticate to UAT Sandbox using JWT
      - name: Authenticate to UAT
        if: steps.delta.outputs.has_changes == 'true'
        run: |
          echo "Authenticating to UAT sandbox using JWT Bearer Flow..."
          
          # Create a secure temporary file for the private key from GitHub secret
          KEY_FILE=$(mktemp)
          printf '%s' "${{ secrets.SF_UAT_JWT_KEY }}" > "$KEY_FILE"
          
          # Authenticate using JWT
          sf org login jwt --client-id "${{ secrets.SF_UAT_CLIENT_ID }}" --jwt-key-file "$KEY_FILE" --username "${{ secrets.SF_UAT_USERNAME }}" --instance-url "https://${{ secrets.SF_UAT_INSTANCE_URL }}" --set-default --alias uat
          
          # Remove the private key file for security
          rm -f "$KEY_FILE"
          
          echo "✅ Authentication successful"
      
      # Step 6: Detect Apex classes for test execution (from delta only)
      - name: Detect Apex classes for testing
        id: detect-tests
        if: steps.delta.outputs.has_changes == 'true'
        run: |
          echo "Detecting changed Apex classes in delta..."
          
          # Find changed Apex class files in delta only, excluding test classes and meta.xml
          APEX_CLASSES=$(find delta/force-app -name "*.cls" -not -name "*_Test.cls" -not -name "*.cls-meta.xml" 2>/dev/null || true)
          
          if [ -z "$APEX_CLASSES" ]; then
            echo "No Apex classes found"
            echo "has_apex=false" >> $GITHUB_OUTPUT
            echo "TEST_LEVEL=NoTestRun" >> $GITHUB_ENV
          else
            echo "Found Apex classes:"
            echo "$APEX_CLASSES"
            
            # Build list of test classes
            TEST_CLASSES=""
            for class_file in $APEX_CLASSES; do
              class_name=$(basename "$class_file" .cls)
              test_class_name="${class_name}_Test"
              
              if [ -z "$TEST_CLASSES" ]; then
                TEST_CLASSES="$test_class_name"
              else
                TEST_CLASSES="$TEST_CLASSES $test_class_name"
              fi
            done
            
            echo "Test classes to run: $TEST_CLASSES"
            echo "has_apex=true" >> $GITHUB_OUTPUT
            echo "test_classes=$TEST_CLASSES" >> $GITHUB_OUTPUT
            echo "TEST_CLASSES=$TEST_CLASSES" >> $GITHUB_ENV
            echo "TEST_LEVEL=RunSpecifiedTests" >> $GITHUB_ENV
          fi
      
      # Step 7: Deploy delta metadata to UAT
      - name: Deploy to UAT
        id: deploy
        if: steps.delta.outputs.has_changes == 'true'
        run: |
          echo "🚀 Deploying delta metadata to UAT..."
          echo "Test level: $TEST_LEVEL"
          
          # Deploy only the changed files via the generated delta package.xml
          DEPLOY_CMD="sf project deploy start --manifest delta/package/package.xml"
          
          # Include destructive changes if sfdx-git-delta generated them
          if [ -f delta/destructiveChanges/destructiveChanges.xml ]; then
            echo "🗑️ Destructive changes detected, adding to deployment..."
            DEPLOY_CMD="$DEPLOY_CMD --post-destructive-changes delta/destructiveChanges/destructiveChanges.xml"
          fi
          
          # Add test level
          if [ "$TEST_LEVEL" = "RunSpecifiedTests" ]; then
            echo "Running specified tests: $TEST_CLASSES"
            # Build test classes with repeated --tests flag for each class
            TEST_FLAGS=""
            for test_class in $TEST_CLASSES; do
              TEST_FLAGS="$TEST_FLAGS --tests $test_class"
            done
            DEPLOY_CMD="$DEPLOY_CMD --test-level RunSpecifiedTests$TEST_FLAGS"
          else
            echo "No tests will be run (NoTestRun)"
            DEPLOY_CMD="$DEPLOY_CMD --test-level NoTestRun"
          fi
          
          # Add JSON output for parsing
          DEPLOY_CMD="$DEPLOY_CMD --json"
          
          echo "Executing: $DEPLOY_CMD"
          
          # Execute deployment and capture output
          set +e
          DEPLOY_RESULT=$(eval $DEPLOY_CMD 2>&1)
          DEPLOY_STATUS=$?
          set -e
          
          echo "=== Deployment Output ==="
          echo "$DEPLOY_RESULT"
          echo "========================="
          
          # Save results to file
          echo "$DEPLOY_RESULT" > deploy-results.json
          
          # Check deployment status
          if [ $DEPLOY_STATUS -ne 0 ]; then
            echo "❌ Deployment failed with exit code $DEPLOY_STATUS"
            echo "Full error output:"
            cat deploy-results.json
            echo "deployment_status=failed" >> $GITHUB_OUTPUT
            exit 1
          else
            echo "✅ Deployment successful"
            echo "deployment_status=success" >> $GITHUB_OUTPUT
          fi
      
      # Step 6: Upload deployment results as artifacts
      - name: Upload deployment results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deployment-results
          path: deploy-results.json
          retention-days: 30
      
      # Step 7: Add deployment summary
      - name: Add deployment summary
        if: always()
        run: |
          echo "## 🚀 UAT Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** Manual workflow dispatch" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ steps.delta.outputs.has_changes }}" != "true" ]; then
            echo "### ⚠️ No Changes Detected" >> $GITHUB_STEP_SUMMARY
            echo "No metadata changes found in \`force-app/\` compared to \`main\`. Deployment was skipped." >> $GITHUB_STEP_SUMMARY
          else
            echo "### Deployment Scope" >> $GITHUB_STEP_SUMMARY
            echo "Deployed delta metadata (files changed in \`uat\` branch compared to \`main\`)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "$TEST_LEVEL" = "RunSpecifiedTests" ] && [ -f deploy-results.json ]; then
            echo "### 🧪 Test Results" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Class | Method | Result | Coverage |" >> $GITHUB_STEP_SUMMARY
            echo "|---|---|---|---|" >> $GITHUB_STEP_SUMMARY
            TEST_ROWS=$(
              jq -r '
                (.result.details.runTestResult.codeCoverage // []) as $cov |
                (reduce $cov[] as $c ({};
                  . + {($c.name): (
                    if $c.numLocations > 0
                    then (($c.numLocations - $c.numLocationsNotCovered) * 100 / $c.numLocations | floor | tostring) + "%"
                    else "N/A" end
                  )}
                )) as $covMap |
                ((.result.details.runTestResult.successes // [])[] |
                  "| `\(.name)` | `\(.methodName)` | ✅ Pass | \($covMap[.name] // "N/A") |"),
                ((.result.details.runTestResult.failures // [])[] |
                  "| `\(.name)` | `\(.methodName)` | ❌ Fail | \($covMap[.name] // "N/A") |")
              ' deploy-results.json 2>/dev/null || true
            )
            if [ -z "$TEST_ROWS" ]; then
              echo "| — | — | ⚠️ No tests ran (possible compile error) | — |" >> $GITHUB_STEP_SUMMARY
            else
              echo "$TEST_ROWS" >> $GITHUB_STEP_SUMMARY
            fi
            echo "" >> $GITHUB_STEP_SUMMARY
          else
            echo "### Tests" >> $GITHUB_STEP_SUMMARY
            echo "No Apex tests were executed (no Apex classes in delta)." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f deploy-results.json ]; then
            echo "### 📋 Deployed Components" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Status | Metadata Type | Component Name | Error |" >> $GITHUB_STEP_SUMMARY
            echo "|---|---|---|---|" >> $GITHUB_STEP_SUMMARY
            jq -r '
              ((.result.details.componentSuccesses // [])[] |
                select(.componentType != "") |
                "| ✅ | \(.componentType) | `\(.fullName)` | |"),
              ((.result.details.componentFailures // [])[] |
                "| ❌ | \(.componentType) | `\(.fullName)` | \(.problem) |")
            ' deploy-results.json >> $GITHUB_STEP_SUMMARY || echo "_Could not parse deployed components._" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ steps.delta.outputs.has_changes }}" != "true" ]; then
            echo "### ⏭️ Deployment Status: SKIPPED" >> $GITHUB_STEP_SUMMARY
            echo "No metadata changes detected — deployment was not triggered." >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.deploy.outputs.deployment_status }}" = "success" ]; then
            echo "### ✅ Deployment Status: SUCCESS" >> $GITHUB_STEP_SUMMARY
            echo "All delta components were successfully deployed to the UAT sandbox." >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ Deployment Status: FAILED" >> $GITHUB_STEP_SUMMARY
            echo "The deployment to UAT encountered errors. Check the logs and the artifact for details." >> $GITHUB_STEP_SUMMARY
          fi
