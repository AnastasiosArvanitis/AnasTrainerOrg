name: Static Code Analysis

on:
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4
      
      # Step 2: Set up Java (required for PMD)
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      # Step 3: Install PMD
      - name: Install PMD
        run: |
          echo "Installing PMD latest version..."
          
          # Get latest PMD version from GitHub releases
          PMD_VERSION=$(curl -s https://api.github.com/repos/pmd/pmd/releases/latest | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/' | sed 's/pmd_releases\///')
          echo "Latest PMD version: $PMD_VERSION"
          
          # Download and extract PMD
          wget -q "https://github.com/pmd/pmd/releases/download/pmd_releases%2F${PMD_VERSION}/pmd-dist-${PMD_VERSION}-bin.zip"
          unzip -q "pmd-dist-${PMD_VERSION}-bin.zip"
          
          # Add PMD to PATH
          echo "$(pwd)/pmd-bin-${PMD_VERSION}/bin" >> $GITHUB_PATH
          
          echo "✅ PMD ${PMD_VERSION} installed successfully"
      
      # Step 4: Create report output directory
      - name: Create report directory
        run: |
          mkdir -p pmd-report
          echo "📁 Report directory created"
      
      # Step 5: Run PMD static analysis
      - name: Run PMD analysis
        id: pmd
        run: |
          echo "🔍 Running PMD static code analysis on force-app..."
          
          # Run PMD with both HTML and XML output formats using the custom ruleset
          set +e
          pmd check \
            --dir force-app \
            --rulesets .pmd/pmd-ruleset.xml \
            --format html \
            --report-file pmd-report/pmd-report.html \
            --minimum-priority 2 \
            --no-cache
          PMD_EXIT_CODE=$?
          
          pmd check \
            --dir force-app \
            --rulesets .pmd/pmd-ruleset.xml \
            --format xml \
            --report-file pmd-report/pmd-report.xml \
            --minimum-priority 2 \
            --no-cache
          set -e
          
          # Count violations
          if [ -f pmd-report/pmd-report.xml ]; then
            VIOLATION_COUNT=$(grep -c "<violation" pmd-report/pmd-report.xml || echo "0")
          else
            VIOLATION_COUNT="0"
          fi
          
          echo "violations=$VIOLATION_COUNT" >> $GITHUB_OUTPUT
          
          if [ "$VIOLATION_COUNT" -gt 0 ]; then
            echo "⚠️  Found $VIOLATION_COUNT violation(s)"
          else
            echo "✅ No violations found"
          fi
          
          echo "PMD analysis completed (exit code: $PMD_EXIT_CODE)"
      
      # Step 6: Upload PMD reports as artifacts
      - name: Upload PMD reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pmd-analysis-report
          path: pmd-report/
          retention-days: 30
      
      # Step 7: Add analysis summary with violations table
      - name: Add analysis summary
        if: always()
        env:
          BRANCH_NAME: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          python3 << 'PYEOF'
          import xml.etree.ElementTree as ET
          import os

          branch_name = os.environ.get('BRANCH_NAME', 'unknown')
          commit_sha = os.environ.get('COMMIT_SHA', 'unknown')
          report_path = 'pmd-report/pmd-report.xml'
          summary_file = os.environ['GITHUB_STEP_SUMMARY']
          workspace = os.environ.get('GITHUB_WORKSPACE', os.getcwd())

          def escape_md(text):
              return (text.replace('\\', '\\\\')
                          .replace('|', '\\|')
                          .replace('`', '\\`')
                          .replace('*', '\\*')
                          .replace('\n', ' ')
                          .replace('\r', ''))

          p1_violations = []
          p2_violations = []

          if os.path.exists(report_path):
              tree = ET.parse(report_path)
              root = tree.getroot()
              for file_elem in root.findall('file'):
                  filename = file_elem.get('name', '')
                  try:
                      short_name = os.path.relpath(filename, workspace)
                  except ValueError:
                      short_name = filename
                  for violation in file_elem.findall('violation'):
                      line = violation.get('beginline', '')
                      rule = violation.get('rule', '')
                      priority = violation.get('priority', '')
                      entry = {'file': short_name, 'line': line, 'rule': rule, 'priority': priority}
                      if priority == '1':
                          p1_violations.append(entry)
                      elif priority == '2':
                          p2_violations.append(entry)

          total = len(p1_violations) + len(p2_violations)

          with open(summary_file, 'a') as f:
              f.write('## 🔍 Static Code Analysis Summary\n\n')
              f.write(f'**Branch:** {branch_name}\n')
              f.write(f'**Commit:** {commit_sha}\n')
              f.write('**Triggered by:** Manual workflow dispatch\n\n')
              f.write('### Analysis Scope\n')
              f.write('Analyzed all Apex code in `force-app/` directory using `.pmd/pmd-ruleset.xml`\n\n')

              if total == 0:
                  f.write('### ✅ No Violations Found\n\n')
              else:
                  f.write(f'### ⚠️ Violations Found: {total} (Priority 1: {len(p1_violations)}, Priority 2: {len(p2_violations)})\n\n')

                  if p1_violations:
                      f.write('❌ Priority 1 violations detected. These violations block deployment.\n\n')
                      f.write('#### 🔴 Priority 1 Violations\n\n')
                      f.write('| File | Line | Violation | Priority |\n')
                      f.write('|------|------|-----------|----------|\n')
                      for v in p1_violations:
                          f.write(f"| `{escape_md(v['file'])}` | {v['line']} | {escape_md(v['rule'])} | {v['priority']} |\n")
                      f.write('\n')

                  if p2_violations:
                      f.write('⚠️ Priority 2 violations detected. These violations should be reviewed.\n\n')
                      f.write('#### 🟡 Priority 2 Violations\n\n')
                      f.write('| File | Line | Violation | Priority |\n')
                      f.write('|------|------|-----------|----------|\n')
                      for v in p2_violations:
                          f.write(f"| `{escape_md(v['file'])}` | {v['line']} | {escape_md(v['rule'])} | {v['priority']} |\n")
                      f.write('\n')

                  f.write('### 📥 Download Reports\n')
                  f.write('The PMD analysis reports are available as artifacts in this workflow run:\n')
                  f.write('- HTML Report: `pmd-report/pmd-report.html`\n')
                  f.write('- XML Report: `pmd-report/pmd-report.xml`\n\n')
                  f.write('Access the artifact from the workflow run summary page.\n')
          PYEOF
