name: Static Code Analysis

on:
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4
      
      # Step 2: Set up Java (required for PMD)
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      # Step 3: Install PMD
      - name: Install PMD
        run: |
          echo "Installing PMD latest version..."
          
          # Get latest PMD version from GitHub releases
          PMD_VERSION=$(curl -s https://api.github.com/repos/pmd/pmd/releases/latest | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/' | sed 's/pmd_releases\///')
          echo "Latest PMD version: $PMD_VERSION"
          
          # Download and extract PMD
          wget -q "https://github.com/pmd/pmd/releases/download/pmd_releases%2F${PMD_VERSION}/pmd-dist-${PMD_VERSION}-bin.zip"
          unzip -q "pmd-dist-${PMD_VERSION}-bin.zip"
          
          # Add PMD to PATH
          echo "$(pwd)/pmd-bin-${PMD_VERSION}/bin" >> $GITHUB_PATH
          
          echo "✅ PMD ${PMD_VERSION} installed successfully"
      
      # Step 4: Create report output directory
      - name: Create report directory
        run: |
          mkdir -p pmd-report
          echo "📁 Report directory created"
      
      # Step 5: Run PMD static analysis
      - name: Run PMD analysis
        id: pmd
        run: |
          echo "🔍 Running PMD static code analysis on force-app..."
          
          # Run PMD with both HTML and XML output formats
          set +e
          pmd check \
            --dir force-app \
            --rulesets .pmd/pmd-ruleset.xml \
            --format html \
            --report-file pmd-report/pmd-report.html \
            --no-cache
          PMD_EXIT_CODE=$?
          
          pmd check \
            --dir force-app \
            --rulesets .pmd/pmd-ruleset.xml \
            --format xml \
            --report-file pmd-report/pmd-report.xml \
            --no-cache
          set -e
          
          # Count violations
          if [ -f pmd-report/pmd-report.xml ]; then
            VIOLATION_COUNT=$(grep -c "<violation" pmd-report/pmd-report.xml || echo "0")
          else
            VIOLATION_COUNT="0"
          fi
          
          echo "violations=$VIOLATION_COUNT" >> $GITHUB_OUTPUT
          
          if [ "$VIOLATION_COUNT" -gt 0 ]; then
            echo "⚠️  Found $VIOLATION_COUNT violation(s)"
          else
            echo "✅ No violations found"
          fi
          
          echo "PMD analysis completed (exit code: $PMD_EXIT_CODE)"
      
      # Step 6: Upload PMD reports as artifacts
      - name: Upload PMD reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pmd-analysis-report
          path: pmd-report/
          retention-days: 30
      
      # Step 7: Add analysis summary
      - name: Add analysis summary
        if: always()
        run: |
          XML_PATH="pmd-report/pmd-report.xml"
          VIOLATIONS_FILE=$(mktemp)

          # Parse violations from XML using awk: output file|line|rule|priority per violation
          if [ -f "$XML_PATH" ]; then
            awk '
              /<file / {
                match($0, /name="([^"]*)"/, arr)
                n = split(arr[1], parts, "/")
                current_file = parts[n]
              }
              /<violation / {
                match($0, /beginline="([^"]*)"/, l)
                match($0, /rule="([^"]*)"/, r)
                match($0, /priority="([^"]*)"/, p)
                print current_file "|" l[1] "|" r[1] "|" p[1]
              }
            ' "$XML_PATH" > "$VIOLATIONS_FILE"
          fi

          P1_COUNT=$(grep -c '|1$' "$VIOLATIONS_FILE" 2>/dev/null || true)
          P2_COUNT=$(grep -c '|2$' "$VIOLATIONS_FILE" 2>/dev/null || true)
          P1_COUNT=${P1_COUNT:-0}
          P2_COUNT=${P2_COUNT:-0}
          TOTAL=$((P1_COUNT + P2_COUNT))

          {
            echo "## 🔍 Static Code Analysis Summary"
            echo ""
            echo "**Branch:** ${{ github.ref_name }}"
            echo "**Commit:** ${{ github.sha }}"
            echo "**Triggered by:** Manual workflow dispatch"
            echo ""
            echo "### Analysis Scope"
            echo "Analyzed all Apex code in \`force-app/\` directory"
            echo ""
            echo "### PMD Ruleset Applied"
            echo "Custom ruleset: \`.pmd/pmd-ruleset.xml\`"
            echo ""

            if [ "$TOTAL" -eq 0 ]; then
              echo "### ✅ No Violations Found"
              echo ""
            else
              echo "### Violations Found: $TOTAL"
              echo ""

              if [ "$P1_COUNT" -gt 0 ]; then
                echo "### ❌ Priority 1 violations detected. These violations block deployment."
                echo ""
                echo "| File | Line | Rule | Priority |"
                echo "|------|------|------|----------|"
                grep '|1$' "$VIOLATIONS_FILE" | while IFS='|' read -r fname line rule priority; do
                  echo "| \`$fname\` | $line | $rule | $priority |"
                done
                echo ""
              fi

              if [ "$P2_COUNT" -gt 0 ]; then
                echo "### ⚠️ Priority 2 violations detected. These violations should be reviewed."
                echo ""
                echo "| File | Line | Rule | Priority |"
                echo "|------|------|------|----------|"
                grep '|2$' "$VIOLATIONS_FILE" | while IFS='|' read -r fname line rule priority; do
                  echo "| \`$fname\` | $line | $rule | $priority |"
                done
                echo ""
              fi
            fi

            echo "### 📥 Download Reports"
            echo "The PMD analysis reports are available as artifacts in this workflow run:"
            echo "- HTML Report: \`pmd-report/pmd-report.html\`"
            echo "- XML Report: \`pmd-report/pmd-report.xml\`"
            echo ""
            echo "Access the artifact from the workflow run summary page."
          } >> "$GITHUB_STEP_SUMMARY"

          rm -f "$VIOLATIONS_FILE"
