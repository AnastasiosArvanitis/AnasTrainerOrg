name: Apex Code Coverage Report

on:
  workflow_dispatch:

jobs:
  code-coverage:
    name: Generate Apex Code Coverage Report
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4
      
      # Step 2: Set up Node.js (required for Salesforce CLI)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      # Step 3: Install Salesforce CLI
      - name: Install Salesforce CLI
        run: |
          echo "Installing Salesforce CLI..."
          npm install --global @salesforce/cli
          sf --version
          echo "✅ Salesforce CLI installed successfully"
      
      # Step 4: Authenticate to Salesforce Production Org
      - name: Authenticate to Salesforce Prod Org
        env:
          SF_PROD_JWT_KEY: ${{ secrets.SF_PROD_JWT_KEY }}
          SF_PROD_CLIENT_ID: ${{ secrets.SF_PROD_CLIENT_ID }}
          SF_PROD_USERNAME: ${{ secrets.SF_PROD_USERNAME }}
          SF_PROD_INSTANCE_URL: ${{ secrets.SF_PROD_INSTANCE_URL }}
        run: |
          echo "🔐 Authenticating to Salesforce production org..."

          if [ -z "$SF_PROD_JWT_KEY" ] || [ -z "$SF_PROD_CLIENT_ID" ] || [ -z "$SF_PROD_USERNAME" ] || [ -z "$SF_PROD_INSTANCE_URL" ]; then
            echo "❌ Missing one or more required Salesforce secrets"
            exit 1
          fi

          INSTANCE_URL="$SF_PROD_INSTANCE_URL"
          if [[ "$INSTANCE_URL" != http://* && "$INSTANCE_URL" != https://* ]]; then
            INSTANCE_URL="https://$INSTANCE_URL"
          fi
          
          # Create a secure temporary file for JWT key
          KEY_FILE=$(mktemp)
          printf '%s' "$SF_PROD_JWT_KEY" > "$KEY_FILE"
          
          # Authenticate using JWT flow
          sf org login jwt \
            --client-id "$SF_PROD_CLIENT_ID" \
            --jwt-key-file "$KEY_FILE" \
            --username "$SF_PROD_USERNAME" \
            --instance-url "$INSTANCE_URL" \
            --alias prod \
            --set-default
          
          # Clean up sensitive file
          rm -f "$KEY_FILE"
          
          echo "✅ Successfully authenticated to production org"
      
      # Step 5: Create coverage report directory
      - name: Create coverage report directory
        run: |
          mkdir -p coverage-report
          echo "📁 Coverage report directory created"
      
      # Step 6: Execute all Apex unit tests
      - name: Run all Apex unit tests
        id: tests
        run: |
          echo "🧪 Executing all Apex unit tests..."
          
          set +e
          
          # Run tests and capture results in JSON format
          sf apex run test \
            --target-org prod \
            --test-level RunLocalTests \
            --wait 30 \
            --result-format json \
            --output-dir coverage-report \
            --code-coverage
          
          TEST_EXIT_CODE=$?
          
          set -e
          
          echo "Test execution exit code: $TEST_EXIT_CODE"
          
          # Store exit code for later use
          echo "exit_code=$TEST_EXIT_CODE" >> $GITHUB_OUTPUT

          echo "Generated files in coverage-report:"
          ls -la coverage-report || true
      
      # Step 7: Generate JSON coverage report
      - name: Generate JSON coverage report
        if: always()
        id: coverage-json
        run: |
          echo "📊 Processing test results and coverage data..."

          # Preferred path: use test run id to fetch canonical test results JSON
          if [ -f coverage-report/test-run-id.txt ] && [ -s coverage-report/test-run-id.txt ]; then
            TEST_RUN_ID=$(tr -d '[:space:]' < coverage-report/test-run-id.txt)
            echo "Found test run id: $TEST_RUN_ID"

            if [ -n "$TEST_RUN_ID" ]; then
              set +e
              sf apex get test \
                --target-org prod \
                --test-run-id "$TEST_RUN_ID" \
                --result-format json \
                --code-coverage > coverage-report/test-results.json
              GET_TEST_EXIT_CODE=$?
              set -e

              if [ $GET_TEST_EXIT_CODE -ne 0 ]; then
                echo "⚠️  Failed to fetch test results via test-run-id. Falling back to generated JSON files."
                rm -f coverage-report/test-results.json
              fi
            fi
          fi
          
          # Resolve test result files safely
          shopt -s nullglob
          RESULT_FILES=(coverage-report/test-result-*.json)
          shopt -u nullglob

          # If canonical file was not generated, select from CLI output files
          if [ ! -f coverage-report/test-results.json ] && [ ${#RESULT_FILES[@]} -gt 0 ]; then
            if [ ${#RESULT_FILES[@]} -gt 1 ]; then
              echo "⚠️  Multiple test result files found (${#RESULT_FILES[@]}). Selecting the one with test summary metrics."
            fi

            # Prefer the newest JSON that contains test run summary
            SELECTED_RESULT_FILE=""
            for candidate in $(ls -1t coverage-report/test-result-*.json); do
              if jq -e '.result.summary.testsRan // .result.totalTestsRun' "$candidate" > /dev/null 2>&1; then
                SELECTED_RESULT_FILE="$candidate"
                break
              fi
            done

            # Fallback if schema check doesn't match
            if [ -z "$SELECTED_RESULT_FILE" ]; then
              echo "⚠️  Could not detect summary schema; falling back to newest JSON file."
              SELECTED_RESULT_FILE=$(ls -1t coverage-report/test-result-*.json | head -n 1)
            fi

            echo "Using test result file: $SELECTED_RESULT_FILE"
            mv "$SELECTED_RESULT_FILE" coverage-report/test-results.json
          fi

          # Check if test results exist
          if [ -f coverage-report/test-results.json ]; then
            
            # Extract coverage metrics using jq
            if command -v jq &> /dev/null; then
              jq '.' coverage-report/test-results.json > coverage-report/coverage-metrics.json
              
              # Extract key metrics
              TOTAL_TESTS=$(jq -r '.result.summary.testsRan // .result.totalTestsRun // 0' coverage-report/test-results.json 2>/dev/null || echo "0")
              TESTS_PASSED=$(jq -r '.result.summary.passing // .result.numTestsCompleted // 0' coverage-report/test-results.json 2>/dev/null || echo "0")
              TESTS_FAILED=$(jq -r '.result.summary.failing // .result.numFailures // 0' coverage-report/test-results.json 2>/dev/null || echo "0")
              CODE_COVERAGE_RAW=$(jq -r '.result.summary.orgWideCoverage // .result.orgWideCoverage.percentage // 0' coverage-report/test-results.json 2>/dev/null || echo "0")
              CODE_COVERAGE="${CODE_COVERAGE_RAW%%%}"
              
              echo "tests_total=$TOTAL_TESTS" >> $GITHUB_OUTPUT
              echo "tests_passed=$TESTS_PASSED" >> $GITHUB_OUTPUT
              echo "tests_failed=$TESTS_FAILED" >> $GITHUB_OUTPUT
              echo "coverage_pct=$CODE_COVERAGE" >> $GITHUB_OUTPUT
            else
              echo "tests_total=Unknown" >> $GITHUB_OUTPUT
              echo "tests_passed=Unknown" >> $GITHUB_OUTPUT
              echo "tests_failed=Unknown" >> $GITHUB_OUTPUT
              echo "coverage_pct=Unknown" >> $GITHUB_OUTPUT
            fi
          else
            echo "⚠️  No test results JSON file found"
            echo "tests_total=0" >> $GITHUB_OUTPUT
            echo "tests_passed=0" >> $GITHUB_OUTPUT
            echo "tests_failed=0" >> $GITHUB_OUTPUT
            echo "coverage_pct=0" >> $GITHUB_OUTPUT
          fi
      
      # Step 8: Generate Markdown coverage summary
      - name: Generate Markdown coverage summary
        if: always()
        run: |
          echo "📝 Creating Markdown coverage report..."
          
          cat > coverage-report/COVERAGE_SUMMARY.md <<'EOF'
          # Apex Code Coverage Report
          
          ## Executive Summary
          Generated from production org on ${{ github.ref_name }} branch  
          Run ID: ${{ github.run_id }}  
          Workflow Triggered: ${{ github.event_name }} by ${{ github.actor }}
          
          ---
          
          ## Test Execution Results
          
          | Metric | Value |
          |--------|-------|
          | **Total Tests Executed** | ${{ steps.coverage-json.outputs.tests_total }} |
          | **Tests Passed** | ${{ steps.coverage-json.outputs.tests_passed }} |
          | **Tests Failed** | ${{ steps.coverage-json.outputs.tests_failed }} |
          | **Overall Code Coverage** | ${{ steps.coverage-json.outputs.coverage_pct }}% |
          
          ---
          
          ## Test Status
          
          ${{ steps.coverage-json.outputs.tests_total == '0' && '⚠️  **No tests were executed - check org test classes and test selection**' || steps.tests.outputs.exit_code == '0' && '✅ **All tests passed successfully**' || '⚠️  **Some tests failed - review details below**' }}
          
          ---
          
          ## Files Generated
          
          - `test-results.json` - Raw test execution results
          - `coverage-metrics.json` - Structured coverage metrics
          - `COVERAGE_SUMMARY.md` - This summary report
          
          ## Next Steps
          
          1. Review the raw JSON reports for detailed test failures
          2. Check coverage gaps in low-coverage classes
          3. Address failed tests before next deployment
          
          ---
          
          Generated at: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EOF

          if [ -f coverage-report/test-results.json ] && command -v jq &> /dev/null; then
            echo "" >> coverage-report/COVERAGE_SUMMARY.md
            echo "## Passed Tests" >> coverage-report/COVERAGE_SUMMARY.md

            PASSED_TESTS=$(jq -r '.result.tests[]? | select((.Outcome // "") | ascii_downcase == "pass") | (.FullName // (.ApexClass.Name + "." + .MethodName))' coverage-report/test-results.json)
            if [ -n "$PASSED_TESTS" ]; then
              echo "$PASSED_TESTS" | sed 's/^/- /' >> coverage-report/COVERAGE_SUMMARY.md
            else
              echo "- None" >> coverage-report/COVERAGE_SUMMARY.md
            fi

            echo "" >> coverage-report/COVERAGE_SUMMARY.md
            echo "## Failed Tests" >> coverage-report/COVERAGE_SUMMARY.md

            FAILED_TESTS=$(jq -r '.result.tests[]? | select((.Outcome // "") | ascii_downcase == "fail") | (.FullName // (.ApexClass.Name + "." + .MethodName))' coverage-report/test-results.json)
            if [ -n "$FAILED_TESTS" ]; then
              echo "$FAILED_TESTS" | sed 's/^/- /' >> coverage-report/COVERAGE_SUMMARY.md
            else
              echo "- None" >> coverage-report/COVERAGE_SUMMARY.md
            fi
          fi
          
          cat coverage-report/COVERAGE_SUMMARY.md
      
      # Step 9: Upload coverage reports as artifacts
      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apex-code-coverage-report
          path: coverage-report/
          retention-days: 30
      
      # Step 10: Add summary to GitHub Actions output
      - name: Add summary to workflow run
        if: always()
        run: |
          echo "# 📊 Apex Code Coverage Analysis" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "## Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "| Metric | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Total Tests | ${{ steps.coverage-json.outputs.tests_total }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Passed | ${{ steps.coverage-json.outputs.tests_passed }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Failed | ${{ steps.coverage-json.outputs.tests_failed }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Code Coverage** | **${{ steps.coverage-json.outputs.coverage_pct }}%** |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ steps.coverage-json.outputs.tests_total }}" == "0" ]; then
            echo "## ⚠️  Status: NO TESTS EXECUTED" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.tests.outputs.exit_code }}" == "0" ]; then
            echo "## ✅ Status: PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ⚠️  Status: FAILED" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "## 📥 Artifact Details" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The complete coverage report has been uploaded as an artifact:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Artifact Name:** `apex-code-coverage-report`" >> $GITHUB_STEP_SUMMARY
          echo "**Retention Period:** 30 days" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### Included Files:" >> $GITHUB_STEP_SUMMARY
          echo "- 📄 `test-results.json` - Raw test execution results" >> $GITHUB_STEP_SUMMARY
          echo "- 📈 `coverage-metrics.json` - Structured coverage metrics" >> $GITHUB_STEP_SUMMARY
          echo "- 📝 `COVERAGE_SUMMARY.md` - Human-readable summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### Branch & Commit" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Run:** [View Workflow Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY

          if [ -f coverage-report/test-results.json ] && command -v jq &> /dev/null; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## ✅ Passed Tests" >> $GITHUB_STEP_SUMMARY

            PASSED_TESTS=$(jq -r '.result.tests[]? | select((.Outcome // "") | ascii_downcase == "pass") | (.FullName // (.ApexClass.Name + "." + .MethodName))' coverage-report/test-results.json)
            if [ -n "$PASSED_TESTS" ]; then
              echo "$PASSED_TESTS" | sed 's/^/- /' >> $GITHUB_STEP_SUMMARY
            else
              echo "- None" >> $GITHUB_STEP_SUMMARY
            fi

            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## ❌ Failed Tests" >> $GITHUB_STEP_SUMMARY

            FAILED_TESTS=$(jq -r '.result.tests[]? | select((.Outcome // "") | ascii_downcase == "fail") | (.FullName // (.ApexClass.Name + "." + .MethodName))' coverage-report/test-results.json)
            if [ -n "$FAILED_TESTS" ]; then
              echo "$FAILED_TESTS" | sed 's/^/- /' >> $GITHUB_STEP_SUMMARY
            else
              echo "- None" >> $GITHUB_STEP_SUMMARY
            fi
          fi
